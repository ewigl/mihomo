    <<: *default-proxies

  - name: SteamCN
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/steam.png
    <<: *all-proxies
    proxies: [⚡ 直连, 默认, 美国, 台湾, 香港, 狮城, 日本]

  - name: SteamGlobal
