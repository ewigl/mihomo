mixed-port: 8486
allow-lan: true

mode: rule
log-level: warning

ipv6: true

find-process-mode: always

tcp-concurrent: true

external-controller: :9090
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages-no-fonts.zip"

profile:
  store-selected: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  ipv6: true
  prefer-h3: true
  cache-algorithm: arc
  listen: :53
  enhanced-mode: redir-host

proxies:
  - name: ⚡ 直连
    type: direct
    udp: true

proxy-providers:
  Local:
    type: file
    path: proxies/local.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 86400

  # Subscription:
  #   type: http
  #   url: http://192.168.8.1:8848/proxy-providers.yaml
  #   health-check:
  #     enable: true
  #     url: http://www.gstatic.com/generate_204
  #     interval: 86400

proxies-anchor:
  all-proxies: &all-proxies
    type: select
    include-all-providers: true

  all-proxies-auto-select: &all-proxies-auto-select
    type: url-test
    include-all-providers: true

  default-proxies: &default-proxies
    type: select
    include-all-providers: true
    proxies: [默认, 美国, 台湾, 香港, 狮城, 日本, ⚡ 直连]

proxy-groups:
  # 默认
  - name: 默认
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/default.png
    type: select
    proxies: [自动选择, 美国, 台湾, 香港, 狮城, 日本, ⚡ 直连]

  # 自动选择
  - name: 自动选择
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/auto.png
    <<: *all-proxies-auto-select

  # 区域
  - name: 美国
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/flags/us.png
    <<: *all-proxies-auto-select
    filter: "US|🇺🇸|美国|United States"

  - name: 台湾
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/flags/cn.png
    <<: *all-proxies-auto-select
    filter: "TW|🇨🇳|🇹🇼|台湾|Taiwan"

  - name: 香港
    icon: http://raw.githubusercontent.com/ewigl/licons/refs/heads/main/flags/hk.png
    <<: *all-proxies-auto-select
    filter: "HK|🇭🇰|香港|HongKong|Hong Kong"

  - name: 狮城
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/flags/sg.png
    <<: *all-proxies-auto-select
    filter: "SG|🇸🇬|新加坡|狮城|Singapore"

  - name: 日本
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/flags/jp.png
    <<: *all-proxies-auto-select
    filter: "JP|🇯🇵|日本|Japan"

  # 服务
  - name: Bahamut
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/bahamut.png
    <<: *all-proxies
    proxies: [台湾, 默认, 美国, 香港, 狮城, 日本, ⚡ 直连]

  - name: DLsite
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/dlsite.png
    <<: *all-proxies
    proxies: [日本, 默认, 美国, 台湾, 香港, 狮城, ⚡ 直连]

  - name: DMM
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/dmm.png
    <<: *all-proxies
    proxies: [日本, 默认, 美国, 台湾, 香港, 狮城, ⚡ 直连]

  - name: EHentai
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/e-hentai.png
    <<: *default-proxies

  - name: EpicGames
    icon: https://raw.githubusercontent.com/ewigl/licons/refs/heads/main/logos/epic-games.png
