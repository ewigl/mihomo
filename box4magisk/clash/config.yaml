mixed-port: 7890
redir-port: 7891
tproxy-port: 1536

allow-lan: false
mode: rule
log-level: warning

ipv6: false

external-controller: localhost:9090
external-ui: metacubexd

geodata-mode: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8

proxy-groups:
  - name: 🚀
    type: select
    proxies:
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇨🇳 Taiwan
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

  - name: 🇺🇸 America
    type: select
    use:
      - Standalone
      - Airports
    filter: "US|🇺🇸"

  - name: 🇭🇰 HongKong
    type: select
    use:
      - Standalone
      - Airports
    filter: "HK|🇭🇰"

  - name: 🇨🇳 Taiwan
    type: select
    use:
      - Standalone
      - Airports
    filter: "TW|🇨🇳|🇹🇼"

  - name: 🇸🇬 Singapore
    type: select
    use:
      - Standalone
      - Airports
    filter: "SG|🇸🇬"

  - name: 🇯🇵 Japan
    type: select
    use:
      - Standalone
      - Airports
    filter: "JP|🇯🇵"

  - name: 🇺🇳 All
    type: select
    use:
      - Standalone
      - Airports
      # - Others

  - name: 📺Bahamut
    type: select
    proxies:
      - 🇨🇳 Taiwan
      - 🚀
      - DIRECT
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

  - name: 📺Bilibili
    type: select
    proxies:
      - DIRECT
      - 🚀
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇨🇳 Taiwan
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

  - name: 🔞Pornhub
    type: select
    proxies:
      - 🚀
      - DIRECT
      - 🇨🇳 Taiwan
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

  - name: 💬Telegram
    type: select
    proxies:
      - 🚀
      - DIRECT
      - 🇨🇳 Taiwan
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

  - name: 📹YouTube
    type: select
    proxies:
      - 🚀
      - DIRECT
      - 🇺🇸 America
      - 🇭🇰 HongKong
      - 🇨🇳 Taiwan
      - 🇸🇬 Singapore
      - 🇯🇵 Japan
      - 🇺🇳 All

proxy-providers:
  Standalone:
    type: file
    path: ./proxies/Standalone.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 7200

  Airports:
    type: file
    path: ./proxies/Airports.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 7200

  # Others:
  #   type: http
  #   url: https://sub.id9.cc/sub?target=clash&url=
  #   path: ./proxies/Others.yaml
  #   health-check:
  #     enable: true
  #     url: http://www.gstatic.com/generate_204
  #     interval: 7200

rule-providers:
  # Clash Rules https://github.com/Loyalsoldier/clash-rules
  icloud:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  # custom-rules local
  custom-direct:
    type: file
    behavior: domain
    path: ./custom-rules/direct.yaml

  custom-proxy:
    type: file
    behavior: domain
    path: ./custom-rules/proxy.yaml

  custom-reject:
    type: file
    behavior: domain
    path: ./custom-rules/reject.yaml

  # extended rules https://github.com/ACL4SSR/ACL4SSR/tree/master/Clash/Providers/Ruleset
  bahamut:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Bahamut.yaml"
    path: ./ruleset/bahamut.yaml
    interval: 86400

  bilibili:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Bilibili.yaml"
    path: ./ruleset/bilibili.yaml
    interval: 86400

  pornhub:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Pornhub.yaml"
    path: ./ruleset/pornhub.yaml
    interval: 86400

  steam-cn:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/SteamCN.yaml"
    path: ./ruleset/steam-cn.yaml
    interval: 86400

  telegram:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Telegram.yaml"
    path: ./ruleset/telegram.yaml
    interval: 86400

  youtube:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/YouTube.yaml"
    path: ./ruleset/youtube.yaml
    interval: 86400

rules:
  # custom
  - RULE-SET,custom-reject,REJECT
  - RULE-SET,custom-direct,DIRECT
  - RULE-SET,custom-proxy,🚀
  # extended
  - RULE-SET,bahamut,📺Bahamut
  - RULE-SET,bilibili,📺Bilibili
  - RULE-SET,pornhub,🔞Pornhub
  - RULE-SET,steam-cn,DIRECT
  - RULE-SET,telegram,💬Telegram
  - RULE-SET,youtube,📹YouTube
  # Clash Rules whitelist
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,cncidr,DIRECT
  - RULE-SET,proxy,🚀
  - RULE-SET,telegramcidr,🚀
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🚀
